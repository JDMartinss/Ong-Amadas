services:
  - type: web
    name: ong-amadas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGIN
        value: https://ong-amadas.vercel.app
      - key: SECRET_KEY
        generateValue: true
